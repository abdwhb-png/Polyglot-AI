<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyglot AI</title>
    <!-- Favicon: White 'P' on Black rounded square -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='0' y='0' width='100' height='100' rx='24' fill='%23000000'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='70' font-weight='900' fill='%23FFFFFF' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              bg: {
                primary: 'var(--bg-primary)',
                secondary: 'var(--bg-secondary)',
              },
              text: {
                primary: 'var(--text-primary)',
                secondary: 'var(--text-secondary)',
              },
              border: {
                primary: 'var(--border-primary)',
              },
              accent: {
                beige: 'var(--accent-beige)',
                mint: 'var(--accent-mint)',
                sky: 'var(--accent-sky)',
                butter: 'var(--accent-butter)',
                lavender: 'var(--accent-lavender)',
              },
              btn: {
                bg: 'var(--btn-bg)',
                text: 'var(--btn-text)',
                glow: 'var(--btn-border-glow)',
              }
            },
            borderWidth: {
              '3': '3px',
              '4': '4px',
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '20px',
              '3xl': '24px',
              '4xl': '32px',
            },
            boxShadow: {
              'brutal': '4px 4px 0px 0px var(--border-primary)',
              'brutal-lg': '8px 8px 0px 0px var(--border-primary)',
              'glow': '0 0 20px var(--btn-border-glow)',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"languages":["en","fr"],"wrapper_selector":".gtranslate_wrapper","switcher_horizontal_position":"inline","float_switcher_open_direction":"bottom"}</script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
    <style>
      :root {
        /* Light Mode (Default) */
        --bg-primary: #F5F2E8;
        --bg-secondary: #FFFFFF;
        --text-primary: #000000;
        --text-secondary: #3A3A3A;
        --border-primary: #000000;
        
        --accent-beige: #F4E8D0;
        --accent-mint: #C8E6D4;
        --accent-sky: #D4E4F0;
        --accent-butter: #F5E8C0;
        --accent-lavender: #E0DDE8;

        --btn-bg: #000000;
        --btn-text: #FFFFFF;
        --btn-border-glow: #FF2D55;
      }

      [data-theme="dark"] {
        /* Dark Mode */
        --bg-primary: #0F0F0F;
        --bg-secondary: #1A1A1A;
        --text-primary: #FFFFFF;
        --text-secondary: #B8B8B8;
        --border-primary: #707070;

        --accent-beige: #2A2520;
        --accent-mint: #1A2E24;
        --accent-sky: #1A242E;
        --accent-butter: #2A2618;
        --accent-lavender: #232028;

        --btn-bg: #FFFFFF;
        --btn-text: #000000;
        --btn-border-glow: #FF2D55;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 300ms ease, color 300ms ease;
      }

      * {
        transition: background-color 300ms ease, border-color 300ms ease, color 300ms ease, box-shadow 300ms ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
        border-left: 2px solid var(--border-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-secondary);
        border: 2px solid var(--border-primary);
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--btn-border-glow);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* GTranslate Customization */
      .gtranslate_wrapper {
        display: inline-block;
      }
      .gt_float_switcher {
        font-family: 'Manrope', sans-serif !important;
        border-radius: 12px !important;
        box-shadow: none !important;
      }
      .gt_float_switcher .gt-selected {
        background: var(--bg-secondary) !important;
        color: var(--text-primary) !important;
        border: 3px solid var(--border-primary) !important;
        border-radius: 12px !important;
      }
      .gt_float_switcher .gt-selected:hover {
        background: var(--bg-primary) !important;
      }
      .gt_float_switcher .gt-options {
        background: var(--bg-secondary) !important;
        border: 3px solid var(--border-primary) !important;
        border-radius: 12px !important;
        box-shadow: 4px 4px 0px 0px var(--border-primary) !important;
      }
      .gt_float_switcher .gt-option {
        color: var(--text-primary) !important;
        transition: all 0.2s !important;
      }
      .gt_float_switcher .gt-option:hover {
        background: var(--bg-primary) !important;
        color: var(--text-primary) !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vitest": "https://esm.sh/vitest@^4.0.18"
  }
}
</script>

</head>

    <div id="root"></div>

</html>
